<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>【イオンモバイル】ノベルティ引換券</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f0f4f8; color: #333; }
    .ticket-container { background: #fff; border: 2px dashed #1976d2; padding: 30px 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; position: relative; }
    h1 { font-size: 1.4em; color: #1976d2; margin-bottom: 10px; }
    .subtitle { font-size: 0.9em; color: #555; margin-bottom: 25px; line-height: 1.5; }
    .benefit-box { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-weight: bold; color: #0d47a1; }
    
    /* ボタンデザイン */
    .btn-use { display: block; width: 100%; padding: 18px; font-size: 1.1em; font-weight: bold; color: #fff; background-color: #d32f2f; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(211,47,47,0.3); }
    .btn-use:active { transform: translateY(2px); box-shadow: 0 2px 4px rgba(211,47,47,0.3); }
    .warning { font-size: 0.8em; color: #d32f2f; margin-top: 15px; font-weight: bold; }
    
    /* 使用済みスタンプのデザイン */
    .used-stamp { font-size: 2em; font-weight: bold; color: #d32f2f; border: 4px solid #d32f2f; padding: 15px; border-radius: 10px; transform: rotate(-10deg); display: inline-block; margin-top: 20px; opacity: 0.8; }
  </style>
</head>
<body>

<div class="ticket-container">
  <h1>🎁 相談来店 特典引換券</h1>
  <p class="subtitle">無料クリーニング・バッテリーチェック<br>＋<br>素敵なノベルティをプレゼント！</p>
  
  <div class="benefit-box">
    スマホのお困りごとはありませんか？<br>スタッフへお気軽にご相談ください。
  </div>

  <div id="action-area">
    <button class="btn-use" onclick="useTicket()">スタッフに提示して特典を利用する</button>
    <p class="warning">※必ず店舗スタッフの目の前でボタンを押してください。誤って押した場合、無効になることがあります。</p>
  </div>
</div>

<script>
  // ページ読み込み時に、過去に使用済みかチェックする
  window.onload = function() {
    if(localStorage.getItem('ticket_used') === 'true') {
      showUsedState();
    }
  }

  // チケットを使用する関数
  function useTicket() {
    // 誤タップ防止の確認ダイアログ
    const isConfirmed = confirm("【確認】\nこの操作は取り消せません。\n店舗スタッフの確認のもと「OK」を押してください。");
    
    if(isConfirmed) {
      // ブラウザに使用済み情報を保存
      localStorage.setItem('ticket_used', 'true');
      showUsedState();
    }
  }

  // 使用済み画面に切り替える関数
  function showUsedState() {
    const actionArea = document.getElementById('action-area');
    actionArea.innerHTML = `
      <div class="used-stamp">使用済み</div>
      <p style="margin-top: 20px; font-weight: bold; color: #555;">ご利用ありがとうございました！</p>
    `;
  }
</script>

</body>
</html>
